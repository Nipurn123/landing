steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_CLERK_PUBLISHABLE_KEY=${_VITE_CLERK_PUBLISHABLE_KEY}'
      - '--build-arg'
      - 'VITE_API_URL=https://api.100xprompt.com'
      - '--build-arg'
      - 'VITE_ADMIN_SECRET=${_VITE_ADMIN_SECRET}'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/100xprompt-frontend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/100xprompt-frontend:latest'
      - '.'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/100xprompt-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/100xprompt-backend:latest'
      - './server'
    waitFor: ['-']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/100xprompt-frontend']
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/100xprompt-backend']
    waitFor: ['build-backend']

  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'deploy'
    args:
      - 'apply'
      - '-k'
      - 'k8s/'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}'
    waitFor: ['push-frontend', 'push-backend']

  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'set-image-frontend'
    args:
      - 'set'
      - 'image'
      - 'deployment/frontend'
      - 'frontend=gcr.io/$PROJECT_ID/100xprompt-frontend:$SHORT_SHA'
      - '-n'
      - 'hundredxprompt'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}'
    waitFor: ['deploy']

  - name: 'gcr.io/cloud-builders/kubectl'
    id: 'set-image-backend'
    args:
      - 'set'
      - 'image'
      - 'deployment/backend'
      - 'backend=gcr.io/$PROJECT_ID/100xprompt-backend:$SHORT_SHA'
      - '-n'
      - 'hundredxprompt'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_CLUSTER_NAME}'
    waitFor: ['deploy']

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

