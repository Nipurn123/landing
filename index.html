<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>100xprompt | Sovereign AI Infrastructure</title>
    <meta name="title" content="100xprompt | Sovereign AI Infrastructure" />
    <meta name="description" content="Build the AI that only you can have. Secure, private, and high-performance foundation models deployed in your sovereign environment." />
    <meta name="keywords" content="AI Infrastructure, Sovereign AI, India AI, Private LLM, 100xprompt, Agentic CLI, AI Models" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://100xprompt.com/" />
    <meta property="og:title" content="100xprompt | Sovereign AI Infrastructure" />
    <meta property="og:description" content="Build the AI that only you can have. Secure, private, and high-performance foundation models." />
    <meta property="og:image" content="https://100xprompt.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://100xprompt.com/" />
    <meta property="twitter:title" content="100xprompt | Sovereign AI Infrastructure" />
    <meta property="twitter:description" content="Build the AI that only you can have. Secure, private, and high-performance foundation models." />
    <meta property="twitter:image" content="https://100xprompt.com/og-image.jpg" />

    <!-- Canonical Link -->
    <link rel="canonical" href="https://100xprompt.com/" />

    <!-- Structured Data for Sitelinks -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "100xprompt",
        "url": "https://100xprompt.com",
        "logo": "https://100xprompt.com/logo.png",
        "sameAs": [
          "https://x.com/100XPrompt",
          "https://www.linkedin.com/company/100xprompt",
          "https://www.instagram.com/100xprompt"
        ],
        "description": "Sovereign AI Infrastructure for Enterprise and Government.",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "sales",
          "url": "https://100xprompt.com/contact"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://100xprompt.com/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://100xprompt.com/search?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">

    <style>
      body { background-color: #ffffff; margin: 0; }
      #root { min-height: 100vh; display: flex; flex-direction: column; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
