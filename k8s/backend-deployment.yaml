apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hundredxprompt
  labels:
    app: 100xprompt
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 100xprompt
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: 100xprompt
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/health"
    spec:
      containers:
        - name: backend
          image: gcr.io/emerald-folio-479006-q9/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: hundredxprompt
  labels:
    app: 100xprompt
    component: backend
spec:
  type: NodePort
  selector:
    app: 100xprompt
    component: backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
