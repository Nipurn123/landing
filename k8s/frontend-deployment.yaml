apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: hundredxprompt
  labels:
    app: 100xprompt
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 100xprompt
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: 100xprompt
        component: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/health"
    spec:
      containers:
        - name: frontend
          image: gcr.io/emerald-folio-479006-q9/landing:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: hundredxprompt
  labels:
    app: 100xprompt
    component: frontend
spec:
  type: NodePort
  selector:
    app: 100xprompt
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
