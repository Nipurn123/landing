apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: hundredxprompt
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: 100xprompt
      component: frontend
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: hundredxprompt
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: 100xprompt
      component: backend
